name: Telegram Test

on:
  workflow_dispatch:
  schedule:
    - cron: "30 3 * * *"
    - cron: "30 16 * * *"

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Install Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python send_test.py
